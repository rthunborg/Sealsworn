code: agds
name: "Auto-GDS Orchestrator"
description: "Drive the GDS/BMGD story workflow end-to-end for one story at a time, delegating each step to model- and effort-tuned subagents on Claude Code or Codex."
module_version: 0.13.4
default_selected: false
module_greeting: >
  auto-gds is installed. Run `/auto-gds` in a BMGD/GDS project to drive the next story
  end-to-end (create-story -> dev-story -> code-review plus project-context and
  retrospective work where applicable). You can pass override instructions, e.g.
  `/auto-gds stop before code-review` or `/auto-gds --story 1-3 skip git commits`.
  Retune delegate model/effort in `{output_folder}/auto-gds/config.yaml`, then run
  `/auto-gds reprovision` to regenerate the tool-native agent files.

# --- Install-time variables (recorded by the BMad installer under [modules.agds]
#     in _bmad/config.toml / _bmad/config.user.toml) ---

target_tools:
  prompt: >
    Which AI tools should auto-gds provision delegate agents for? This defaults to the AIs your
    BMAD install already targets (detected from where the auto-gds skill is installed —
    .claude/skills for Claude Code, .agents/skills for Codex); confirm or adjust. Select more than
    one to run this project in either tool without reconfiguring — the running tool is
    auto-detected each run. This only controls which agent files get generated.
  multi-select:
    - value: claude-code
      label: "Claude Code  (.claude/agents — model + thinking effort)"
    - value: codex
      label: "Codex  (.codex/agents — model + reasoning effort)"
  default:
    - claude-code
    - codex

post-install-notes: >
  Auto-GDS renders its delegate agent files on first run (or via `/auto-gds setup`). To change
  which model or thinking/reasoning effort each pipeline step uses, edit the `profiles` block in
  `{output_folder}/auto-gds/config.yaml` and run `/auto-gds reprovision`. The generated
  agent files (`.claude/agents/agds-*.md`, `.codex/agents/agds-*.toml`) are local artifacts —
  add them to your `.gitignore` if you do not want them committed.
