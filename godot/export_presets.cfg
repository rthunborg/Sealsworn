; Godot 4.6.3 export preset scaffold.
; These presets preserve the native packaging path early without marking mobile
; signing/template/icon work as export-ready.
; Keep test/tool/source data excluded from every production export.

[preset.0]

name="Windows Desktop MVP"
platform="Windows Desktop"
runnable=true
dedicated_server=false
custom_features=""
export_filter="resources"
include_filter="assets/**,data/resources/**,data/localization/**,scenes/app/**,scenes/game/**,scenes/entities/**,scenes/ui/**,scenes/effects/**,scripts/autoloads/**,scripts/core/**,scripts/tactical/**,scripts/rules/**,scripts/generation/**,scripts/ai/**,scripts/content/**,scripts/save/**,scripts/ui/**,scripts/platform/**,scripts/diagnostics/**,scripts/utils/**"
exclude_filter="addons/**,data/source/**,scenes/debug/**,tests/**,tools/**,**/*_test.gd,**/test_*.gd"
export_path="../build/windows/sealsworn.exe"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=true
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false

